---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: no-ip
  labels:
    app: no-ip
  namespace: www
spec:
  selector:
    matchLabels:
      app: no-ip
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: no-ip
    spec:
      containers:
        - image: local.registry/skwr/www/no-ip
          name: noip
          env:
            - name: NOIP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: no-ip
                  key: NOIP_PASSWORD
            - name: NOIP_EMAIL
              valueFrom:
                secretKeyRef:
                  name: no-ip
                  key: NOIP_EMAIL
          envFrom:
            - configMapRef:
                name: no-ip.env
